# Databricks Asset Bundle Configuration for AutoGenie
# Deploy: databricks bundle deploy --target dev

bundle:
  name: autogenie

sync:
  exclude:
    # Virtual environments
    - ".venv"
    - "venv"
    - "ENV"
    - "env"

    # Node modules and frontend build cache
    - "frontend/node_modules"
    - "frontend/.next"

    # Local storage and runtime data
    - "storage"
    - "output"

    # Git and development
    - ".git"
    - ".databricks"
    - "worktrees"

    # Python bytecode
    - "__pycache__"
    - "*.pyc"
    - "*.pyo"
    - "*.pyd"

    # Environment and secrets
    - ".env"
    - ".env.local"

    # Cache and temporary files
    - "*.log"
    - "*.pid"
    - ".parse_cache.json"

    # IDE and OS
    - ".vscode"
    - ".idea"
    - ".DS_Store"

    # Non-source assets
    - "docs"
    - "presentations"
    - "generate_demo"
    - ".claude"


resources:
  apps:
    autogenie_app:
      name: autogenie
      description: AutoGenie - Create and enhance Databricks Genie Spaces with AI-powered automation
      permissions:
        - group_name: users
          level: CAN_USE

variables:
  app_service_principal_id:
    description: "Service principal ID of the deployed app (set after first deployment)"
    default: ""

# Target environments
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://krafton-sandbox.cloud.databricks.com/
      profile: krafton-sandbox
    variables:
      app_service_principal_id: ""
    resources:
      apps:
        autogenie_app:
          name: autogenie-dev
          source_code_path: ${workspace.file_path}
          # User authorization scopes - required for OBO token to access UC and SQL
          user_api_scopes:
            - sql
            - catalog.tables:read
            - catalog.schemas:read
            - catalog.catalogs:read
            - dashboards.genie
          # Grant app SP access to resources
          resources:
            - name: "validation-warehouse"
              description: "SQL Warehouse for validation and scoring"
              sql_warehouse:
                id: "2bb34723ee4a8a07"
                permission: "CAN_USE"
            - name: "databricks-gpt-5-2"
              description: "LLM endpoint for text generation"
              serving_endpoint:
                name: "databricks-gpt-5-2"
                permission: "CAN_QUERY"
            - name: "databricks-claude-sonnet-4"
              description: "Vision model endpoint for PDF parsing"
              serving_endpoint:
                name: "databricks-claude-sonnet-4"
                permission: "CAN_QUERY"

  e2-demo-tokyo:
    workspace:
      host: https://e2-demo-tokyo.cloud.databricks.com/
      profile: e2-demo-tokyo
    variables:
      app_service_principal_id: ""
    resources:
      apps:
        autogenie_app:
          name: autogenie
          source_code_path: ${workspace.file_path}
          user_api_scopes:
            - sql
            - catalog.tables:read
            - catalog.schemas:read
            - catalog.catalogs:read
            - dashboards.genie
          resources:
            - name: "validation-warehouse"
              description: "SQL Warehouse for validation and scoring"
              sql_warehouse:
                id: "bec52b183a4cfe2a"
                permission: "CAN_USE"
            - name: "databricks-gpt-5-2"
              description: "LLM endpoint for text generation"
              serving_endpoint:
                name: "databricks-gpt-5-2"
                permission: "CAN_QUERY"
            - name: "databricks-claude-sonnet-4"
              description: "Vision model endpoint for PDF parsing"
              serving_endpoint:
                name: "databricks-claude-sonnet-4"
                permission: "CAN_QUERY"
