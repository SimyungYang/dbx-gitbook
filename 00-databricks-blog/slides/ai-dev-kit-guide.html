<h1 id="sql-%EC%8B%A4%ED%96%89--genie-%EC%97%B0%EB%8F%99">SQL 실행 &amp; Genie 연동</h1>
<h2 id="ai%EA%B0%80-%EC%A7%81%EC%A0%91-sql%EC%9D%84-%EC%9E%91%EC%84%B1%ED%95%98%EA%B3%A0-%EC%8B%A4%ED%96%89%ED%95%A9%EB%8B%88%EB%8B%A4">AI가 직접 SQL을 작성하고 실행합니다</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- AI에게: &quot;지난 달 매출 상위 10개 제품 보여줘&quot;</span>
<span class="hljs-keyword">SELECT</span> p.product_name, <span class="hljs-built_in">SUM</span>(o.amount) <span class="hljs-keyword">as</span> total_revenue
<span class="hljs-keyword">FROM</span> production.sales.orders o
<span class="hljs-keyword">JOIN</span> production.sales.products p <span class="hljs-keyword">ON</span> o.product_id <span class="hljs-operator">=</span> p.product_id
<span class="hljs-keyword">WHERE</span> o.order_date <span class="hljs-operator">&gt;=</span> DATE_ADD(<span class="hljs-built_in">CURRENT_DATE</span>(), <span class="hljs-number">-30</span>)
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> p.product_name
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> total_revenue <span class="hljs-keyword">DESC</span> LIMIT <span class="hljs-number">10</span>;
</code></pre>
